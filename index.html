<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자산관리 Dashboard - Upbit Style</title>
  <!-- 부트스트랩 5 CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- 프리텐다드 폰트 적용 -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  
  <!-- 📊 Chart.js 라이브러리 및 비율 표기용 플러그인 추가 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
  
  <style>
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: #091224 !important; /* 💙 업비트 딥 네이비 배경 */
      color: #ffffff !important;
      padding-top: 2rem;
      padding-bottom: 3rem;
    }
    .container {
      max-width: 800px;
    }
    
    /* 🏆 업비트 스타일 보유자산 총액 배너 */
    .main-total-banner {
      background-color: #0b162c !important;
      border: 1px solid #172443 !important;
      border-radius: 8px;
      padding: 1.75rem 1.5rem;
      margin-bottom: 1.5rem;
    }

    /* 🟢 실시간 동기화 네온 점 */
    .sync-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #00e676 !important;
      letter-spacing: 0.5px;
    }
    .sync-dot {
      width: 6px;
      height: 6px;
      background-color: #00e676;
      border-radius: 50%;
      box-shadow: 0 0 6px #00e676;
      animation: blink 2s infinite;
    }
    @keyframes blink {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }

    /* 대시보드 박스 */
    .dashboard-row {
      background-color: #0b162c !important;
      border: 1px solid #172443 !important;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .chart-box {
      max-width: 180px;
      margin: 0 auto;
    }

    .summary-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      justify-content: center;
    }
    
    /* 호가창 느낌의 아이템 열 */
    .mini-bar-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #111e36 !important;
      padding: 0.6rem 1rem;
      border-radius: 4px;
      border-left: 4px solid #58697f;
    }
    .mini-bar-item .title { font-size: 0.85rem; font-weight: 600; color: #9aa5b5 !important; }
    .mini-bar-item .amount { font-size: 0.95rem; font-weight: 700; color: #ffffff !important; }

    /* 업비트 테마 컬러 매칭 */
    .border-투자 { border-left-color: #e15241 !important; } 
    .border-예금 { border-left-color: #418df1 !important; } 
    .border-보험 { border-left-color: #26a69a !important; } 
    .border-연금 { border-left-color: #ffb300 !important; } 
    .border-기타 { border-left-color: #78889b !important; }

    /* 테이블 스타일 (색상 묻힘 전면 방어) */
    .table-container {
      background-color: #0b162c !important;
      border: 1px solid #172443 !important;
      border-radius: 8px;
      padding: 1rem;
      margin-top: 0.5rem;
    }
    .table {
      margin-bottom: 0;
      background-color: transparent !important;
    }
    .table th {
      font-weight: 600;
      color: #9aa5b5 !important;
      background-color: #111e36 !important;
      border-bottom: 1px solid #172443 !important;
      padding: 0.75rem 0.5rem;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    .table td {
      padding: 0.85rem 0.5rem;
      border-bottom: 1px solid #172443 !important;
      color: #ffffff !important;
      background-color: transparent !important;
      font-size: 0.9rem;
      white-space: nowrap;
    }
    .table-hover tbody tr:hover td {
      background-color: #152441 !important; /* 마우스 올렸을 때 행 배경색 */
    }

    /* 배지 스타일 */
    .badge-asset {
      font-weight: 600;
      padding: 0.25rem 0.45rem;
      border-radius: 2px;
      font-size: 0.75rem;
    }
    .badge-투자 { background-color: rgba(225, 82, 65, 0.2) !important; color: #f27263 !important; }
    .badge-예금 { background-color: rgba(65, 141, 241, 0.2) !important; color: #6cb1ff !important; }
    .badge-보험 { background-color: rgba(38, 166, 154, 0.2) !important; color: #4db6ac !important; }
    .badge-연금 { background-color: rgba(255, 179, 0, 0.2) !important; color: #ffd54f !important; }
    .badge-기타 { background-color: rgba(120, 136, 155, 0.2) !important; color: #b0bec5 !important; }

    .section-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: #9aa5b5 !important;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- 🏆 1. 업비트 스타일 보유자산 총액 배너 -->
    <div class="main-total-banner">
      <div class="row align-items-center">
        <div class="col-8 text-start">
          <div class="small fw-medium mb-1" style="color: #9aa5b5 !important;">총 보유자산</div>
          <div class="h2 fw-bold my-1 tracking-tight" id="grandTotalDisplay" style="font-size: 2.2rem; color: #e15241 !important;">0 KRW</div>
        </div>
        <div class="col-4 text-end">
          <div class="sync-status">
            <span class="sync-dot"></span>
            <span>정상 동기화</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 📊 2. 업비트 포트폴리오 요약 비율 -->
    <div class="section-title mb-2">📊 자산 보유 비중</div>
    <div class="dashboard-row">
      <div class="row align-items-center g-4">
        <div class="col-sm-5 text-center">
          <div class="chart-box">
            <canvas id="assetDonutChart" width="180" height="180"></canvas>
          </div>
        </div>
        <div class="col-sm-7">
          <div class="summary-list" id="summaryContainer">
            <div style="color: #9aa5b5 !important;" class="small p-2">데이터 분석 중...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 🔍 3. 상세 내역 테이블 -->
    <div class="section-title mb-2">🔍 자산별 상세 보유내역</div>
    <div class="table-container">
      <div class="table-responsive">
        <table class="table table-hover align-middle" id="assetTable">
          <thead>
            <tr>
              <th>자산명</th>
              <th>구분</th>
              <th class="text-end">보유금액(KRW)</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="3" class="text-center py-5" style="color: #9aa5b5 !important;">
                <div class="spinner-border spinner-border-sm text-light me-2" role="status"></div>
                자산 데이터를 동기화하고 있습니다...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const ASSET_COLUMN_INDEX = 0;    
    const CATEGORY_COLUMN_INDEX = 1; 
    const JUNE_COLUMN_INDEX = 2;     

    let myChart = null; 

    function getCellString(cell) {
      if (!cell || cell.v === null || cell.v === undefined) return '';
      return cell.v.toString().trim();
    }

    function parseToNumber(cell) {
      const strVal = getCellString(cell).replace(/[^0-9.-]/g, ''); 
      if (strVal === '') return 0;
      const num = Number(strVal);
      return isNaN(num) ? 0 : num;
    }

    function formatCurrency(cell) {
      if (!cell || cell.v === null || cell.v === undefined || cell.v === '') return '0 KRW';
      if (cell.f) return cell.f + ' KRW';
      const num = parseToNumber(cell);
      return num.toLocaleString('ko-KR') + ' KRW';
    }

    async function loadData() {
      try {
        const url = "https://docs.google.com/spreadsheets/d/1sLDzNjAnvVhMCctNZgttP6daktZalRVWfolCx9XciT8/gviz/tq?tqx=out:json&_=" + new Date().getTime();
        const response = await fetch(url);
        const text = await response.text();
        
        const json = JSON.parse(text.substr(47).slice(0, -2));
        const rows = json.table?.rows || [];

        if (rows.length === 0) {
          document.getElementById("tableBody").innerHTML = `<tr><td colspan="3" class="text-center py-4" style="color:#9aa5b5;">데이터가 비어 있습니다.</td></tr>`;
          return;
        }

        const targetCategories = ['투자', '예금', '보험', '연금'];
        const summaryMap = { '투자': 0, '예금': 0, '보험': 0, '연금': 0 };
        let otherTotal = 0;
        let grandTotal = 0; 

        let bodyHTML = '';

        for (let i = 0; i < rows.length; i++) {
          if (!rows[i] || !rows[i].c || !Array.isArray(rows[i].c)) continue;
          const cells = rows[i].c;

          const cellAsset = cells[ASSET_COLUMN_INDEX];
          const cellCategory = cells[CATEGORY_COLUMN_INDEX];
          const cellJune = cells[JUNE_COLUMN_INDEX];

          const assetVal = getCellString(cellAsset);
          const categoryVal = getCellString(cellCategory);

          if (assetVal === '자산' || categoryVal === '구분' || assetVal.includes('계') || categoryVal.includes('계') || (assetVal === '' && categoryVal === '')) {
            continue; 
          }

          const juneNum = parseToNumber(cellJune);
          grandTotal += juneNum; 

          if (targetCategories.includes(categoryVal)) {
            summaryMap[categoryVal] = (summaryMap[categoryVal] || 0) + juneNum;
          } else if (categoryVal !== '') {
            otherTotal += juneNum;
          }

          const badgeClass = targetCategories.includes(categoryVal) ? `badge-${categoryVal}` : 'badge-기타';

          bodyHTML += '<tr>';
          bodyHTML += `<td class="fw-semibold text-white text-wrap" style="white-space: normal; min-width: 120px;">${assetVal || '-'}</td>`; 
          bodyHTML += `<td><span class="badge-asset ${badgeClass}">${categoryVal || '미분류'}</span></td>`;
          bodyHTML += `<td class="text-end fw-bold text-white">${formatCurrency(cellJune)}</td>`;
          bodyHTML += '</tr>';
        }
        
        // 💡 중요 안전망: 텍스트 및 테이블을 차트 그리기 "전에" 먼저 밀어넣어 무조건 띄웁니다.
        document.getElementById("tableBody").innerHTML = bodyHTML || `<tr><td colspan="3" class="text-center py-4" style="color:#9aa5b5;">표시할 내역이 없습니다.</td></tr>`;
        document.getElementById("grandTotalDisplay").innerHTML = `${grandTotal.toLocaleString('ko-KR')}<span class="fs-4 fw-normal" style="color: #9aa5b5 !important;"> KRW</span>`;

        let summaryHTML = '';
        targetCategories.forEach(category => {
          const totalVal = summaryMap[category] || 0;
          const percentage = grandTotal > 0 ? ((totalVal / grandTotal) * 100).toFixed(1) : 0;
          summaryHTML += `
            <div class="mini-bar-item border-${category}">
              <span class="title">${category} <small class="ms-1" style="color: #6cb1ff;">${percentage}%</small></span>
              <span class="amount">${totalVal.toLocaleString('ko-KR')} KRW</span>
            </div>
          `;
        });

        if (otherTotal > 0) {
          const otherPercentage = grandTotal > 0 ? ((otherTotal / grandTotal) * 100).toFixed(1) : 0;
          summaryHTML += `
            <div class="mini-bar-item border-기타">
              <span class="title">기타 자산 <small class="ms-1" style="color: #b0bec5;">${otherPercentage}%</small></span>
              <span class="amount">${otherTotal.toLocaleString('ko-KR')} KRW</span>
            </div>
          `;
        }
        document.getElementById("summaryContainer").innerHTML = summaryHTML;

        // 💡 완전히 차단 격리된 차트 렌더링 존 (플러그인 충돌 원천 배제)
        try {
          const chartCanvas = document.getElementById('assetDonutChart');
          if (chartCanvas && typeof Chart !== 'undefined') {
            const chartLabels = [...targetCategories];
            const chartData = [summaryMap['투자'], summaryMap['예금'], summaryMap['보험'], summaryMap['연금']];
            const chartColors = ['#e15241', '#418df1', '#26a69a', '#ffb300'];

            if (otherTotal > 0) {
              chartLabels.push('기타 자산');
              chartData.push(otherTotal);
              chartColors.push('#78889b');
            }

            const ctx = chartCanvas.getContext('2d');
            if (myChart) myChart.destroy(); 

            myChart = new Chart(ctx, {
              type: 'doughnut',
              data: {
                labels: chartLabels,
                datasets: [{
                  data: chartData,
                  backgroundColor: chartColors,
                  borderWidth: 0,
                  hoverOffset: 4
                }]
              },
              plugins: [typeof ChartDataLabels !== 'undefined' ? ChartDataLabels : {}],
              options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                  legend: { display: false },
                  datalabels: {
                    color: '#ffffff',
                    font: { weight: 'bold', size: 10, family: 'Pretendard' },
                    formatter: (value) => {
                      if (grandTotal === 0) return "";
                      let percentage = (value * 100 / grandTotal).toFixed(1);
                      return percentage > 5 ? percentage + "%" : ""; 
                    }
                  }
                },
                cutout: '70%'
              }
            });
          }
        } catch (chartError) {
          console.error("차트 에러 유연하게 우회함:", chartError);
        }

      } catch (error) {
        console.error("최상위 에러 수집 로그:", error);
        document.getElementById("tableBody").innerHTML = `<tr><td colspan="3" class="text-center text-danger py-5">⚠️ 대시보드 연동 에러: ${error.message}</td></tr>`;
      }
    }

    window.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
