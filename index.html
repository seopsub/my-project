<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>개인 자산 관리 프로그램</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f4f6f9;
      padding-top: 2rem;
    }
    .container {
      max-width: 1000px;
    }
    .card-summary {
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      transition: transform 0.2s;
    }
    .card-summary:hover {
      transform: translateY(-2px);
    }
    .table-container {
      background-color: #ffffff;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      padding: 1.5rem;
      margin-top: 1.5rem;
    }
    /* 항목별 포인트 색상 */
    .border-보험 { border-left: 5px solid #0d6efd; }
    .border-예금 { border-left: 5px solid #198754; }
    .border-연금 { border-left: 5px solid #ffc107; }
    .border-투자 { border-left: 5px solid #dc3545; }
    .border-기타 { border-left: 5px solid #6c757d; }
  </style>
</head>
<body>

  <div class="container">
    <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4">
      <h1 class="h2 text-dark fw-bold">💰 개인 자산 관리</h1>
      <span class="badge bg-success">구글 시트 실시간 연동</span>
    </div>

    <h3 class="h5 mb-3 fw-bold text-secondary">📋 자산 항목별 6월 합계</h3>
    <div class="row g-3 mb-4" id="summaryContainer">
      <div class="col-12 text-muted">데이터를 계산하는 중입니다...</div>
    </div>

    <h3 class="h5 mb-3 fw-bold text-secondary">🔍 상세 자산 내역</h3>
    <div class="table-container">
      <div class="table-responsive">
        <table class="table table-hover align-middle" id="assetTable">
          <thead class="table-light">
            <tr id="tableHead">
              </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="100%" class="text-center text-muted py-4">
                <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>
                데이터를 불러오는 중입니다...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // 숫자인지 확인하고 쉼표(,)를 추가하는 함수
    function formatCurrency(value) {
      if (value === null || value === undefined || value === '') return '0';
      if (isNaN(value)) return value;
      return Number(value).toLocaleString('ko-KR');
    }

    async function loadData() {
      try {
        const url = "https://docs.google.com/spreadsheets/d/1sLDzNjAnvVhMCctNZgttP6daktZalRVWfolCx9XciT8/gviz/tq?tqx=out:json";
        const response = await fetch(url);
        const text = await response.text();
        
        const json = JSON.parse(text.substr(47).slice(0, -2));
        const rows = json.table.rows;

        if (rows.length === 0) {
          document.getElementById("tableBody").innerHTML = `<tr><td class="text-center py-4">데이터가 없습니다.</td></tr>`;
          return;
        }

        // 1. 헤더 생성
        const firstRow = rows[0].c;
        const headHTML = firstRow.map(cell => `<th>${cell?.v ?? ''}</th>`).join('');
        document.getElementById("tableHead").innerHTML = headHTML;

        // '구분' 컬럼과 '6월' 컬럼 인덱스 찾기
        let categoryIdx = -1;
        let juneIdx = -1;
        firstRow.forEach((cell, idx) => {
          const colName = cell?.v?.toString().trim() ?? '';
          if (colName === '구분') categoryIdx = idx;
          if (colName === '6월') juneIdx = idx;
        });

        // 💡 지정한 4개 항목만 딱 초기화 해두기 (데이터가 없어도 0원으로 뜨게 설정)
        const targetCategories = ['보험', '예금', '연금', '투자'];
        const summaryMap = { '보험': 0, '예금': 0, '연금': 0, '투자': 0 };
        let otherTotal = 0; // 혹시나 그 외의 항목이 있다면 합산할 곳

        // 2. 데이터 행 생성 및 원하는 항목별 SUM 계산
        let bodyHTML = '';
        for (let i = 1; i < rows.length; i++) {
          const cells = rows[i].c;
          if (!cells) continue;

          bodyHTML += '<tr>';
          
          // 구분값과 6월 금액 추출 (공백 제거 처리)
          const rawCategory = (categoryIdx !== -1 && cells[categoryIdx]?.v) ? cells[categoryIdx].v.toString().trim() : '';
          const juneValue = (juneIdx !== -1 && cells[juneIdx]?.v) ? Number(cells[juneIdx].v) : 0;

          // 보험, 예금, 연금, 투자에 해당하면 합산하고 아니면 기타로 분류
          if (!isNaN(juneValue)) {
            if (targetCategories.includes(rawCategory)) {
              summaryMap[rawCategory] += juneValue;
            } else {
              otherTotal += juneValue;
            }
          }

          cells.forEach((cell) => {
            let val = cell?.v ?? '';
            let displayVal = formatCurrency(val);
            
            if (!isNaN(val) && val !== '') {
              bodyHTML += `<td class="text-end fw-mono">${displayVal}</td>`;
            } else {
              bodyHTML += `<td>${displayVal}</td>`;
            }
          });
          bodyHTML += '</tr>';
        }
        
        document.getElementById("tableBody").innerHTML = bodyHTML;

        // 3. 📊 요약 카드 렌더링
        let summaryHTML = '';
        
        // 지정된 4대 항목 순서대로 카드 만들기
        targetCategories.forEach(category => {
          summaryHTML += `
            <div class="col-md-3 col-sm-6">
              <div class="p-3 card-summary border-${category}">
                <div class="text-muted small fw-bold">${category} 합계</div>
                <div class="h4 mb-0 fw-bold text-dark mt-1">${formatCurrency(summaryMap[category])} 원</div>
              </div>
            </div>
          `;
        });

        // 만약 보험/예금/연금/투자 외에 다른 구분 데이터가 존재했다면 '기타' 카드도 띄워줌
        if (otherTotal > 0) {
          summaryHTML += `
            <div class="col-md-3 col-sm-6">
              <div class="p-3 card-summary border-기타">
                <div class="text-muted small fw-bold">기타 합계</div>
                <div class="h4 mb-0 fw-bold text-dark mt-1">${formatCurrency(otherTotal)} 원</div>
              </div>
            </div>
          `;
        }

        document.getElementById("summaryContainer").innerHTML = summaryHTML;

      } catch (error) {
        console.error("데이터 로드 실패:", error);
        document.getElementById("tableBody").innerHTML = `<tr><td class="text-center text-danger py-4">데이터를 불러오지 못했습니다. 컬럼명을 확인해 보세요.</td></tr>`;
      }
    }

    window.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
