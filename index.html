<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자산관리 Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: #f8fafc;
      color: #334155;
      padding-top: 3rem;
      padding-bottom: 3rem;
    }
    .container {
      max-width: 1140px; /* 전체 합계 추가로 가로 폭을 살짝 넓힘 */
    }
    .card-summary {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
      transition: all 0.25s ease;
      height: 100%;
    }
    .card-summary:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
    }
    .table-container {
      background-color: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
      padding: 1.5rem;
      margin-top: 1.5rem;
    }
    .table th {
      font-weight: 600;
      color: #64748b;
      background-color: #f8fafc !important;
      border-bottom: 1px solid #e2e8f0;
      padding: 1rem 0.75rem;
    }
    .table td {
      padding: 1rem 0.75rem;
      border-bottom: 1px solid #f1f5f9;
      color: #0f172a;
    }
    .badge-asset {
      font-weight: 500;
      padding: 0.35rem 0.65rem;
      border-radius: 8px;
      font-size: 0.85rem;
    }
    .badge-보험 { background-color: #eff6ff; color: #1d4ed8; }
    .badge-예금 { background-color: #ecfdf5; color: #047857; }
    .badge-연금 { background-color: #fffbeb; color: #b45309; }
    .badge-투자 { background-color: #fef2f2; color: #b91c1c; }
    .badge-기타 { background-color: #f8fafc; color: #475569; border: 1px solid #e2e8f0; }

    /* 대시보드 상단 포인트 라인 스타일 */
    .accent-총합계 { border-top: 4px solid #0f172a; background: #f8fafc; } /* 총합계는 차분하고 묵직한 톤 */
    .accent-보험 { border-top: 4px solid #3b82f6; }
    .accent-예금 { border-top: 4px solid #10b981; }
    .accent-연금 { border-top: 4px solid #f59e0b; }
    .accent-투자 { border-top: 4px solid #ef4444; }
    .accent-기타 { border-top: 4px solid #64748b; }
  </style>
</head>
<body>

  <div class="container">
    <div class="d-flex justify-content-between align-items-center mb-5">
      <div>
        <h1 class="h3 fw-bold text-dark m-0">My 자산 현황</h1>
        <p class="text-muted small m-0 mt-1">구글 스프레드시트 실시간 대시보드</p>
      </div>
      <span class="badge bg-dark px-3 py-2 rounded-pill fs-7">Live Sync</span>
    </div>

    <h3 class="fs-6 fw-bold text-secondary mb-3">자산 분류별 6월 합계</h3>
    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-5 g-3 mb-5" id="summaryContainer">
      <div class="col-12 text-muted">자산을 계산하는 중입니다...</div>
    </div>

    <h3 class="fs-6 fw-bold text-secondary mb-3">상세 자산 내역</h3>
    <div class="table-container">
      <div class="table-responsive">
        <table class="table align-middle" id="assetTable">
          <thead>
            <tr>
              <th style="width: 45%;">자산명</th>
              <th style="width: 25%;">구분</th>
              <th style="width: 30%;" class="text-end">6월 금액</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="3" class="text-center text-muted py-5">
                <div class="spinner-border spinner-border-sm text-secondary me-2" role="status"></div>
                로딩 중...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const ASSET_COLUMN_INDEX = 0;    
    const CATEGORY_COLUMN_INDEX = 1; 
    const JUNE_COLUMN_INDEX = 2;
