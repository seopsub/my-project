<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>보안 자산관리 Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: #091224 !important; /* 💙 업비트 시그니처 다크 네이비 */
      color: #ffffff !important;
      padding-top: 2rem;
      padding-bottom: 3rem;
    }
    .container { max-width: 800px; }
    
    /* 🔒 업비트 로그인 스타일의 명확한 잠금 화면 UI */
    #lockScreen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-color: #091224; z-index: 9999;
      display: flex; justify-content: center; align-items: center;
      padding: 20px;
    }
    .lock-box {
      background-color: #0b162c; 
      border: 1px solid #1a2e56; 
      padding: 3rem 2rem; 
      border-radius: 12px; 
      width: 100%; 
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
    }
    .lock-logo {
      font-size: 1.5rem;
      font-weight: 800;
      color: #418df1; 
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
    }
    .lock-input {
      background: #111e36 !important; 
      color: #ffffff !important; 
      border: 1px solid #223a66 !important;
      text-align: center; 
      font-size: 1.3rem; 
      letter-spacing: 6px;
      padding: 0.75rem !important;
      border-radius: 6px !important;
    }
    .lock-input:focus { 
      border-color: #418df1 !important; 
      box-shadow: 0 0 0 3px rgba(65, 141, 241, 0.2) !important; 
    }
    .lock-btn { 
      background-color: #418df1 !important; 
      border: none !important; 
      font-weight: 700; 
      color: #ffffff !important; 
      padding: 0.85rem !important;
      font-size: 1rem;
      border-radius: 6px !important;
      transition: background 0.2s;
    }
    .lock-btn:hover {
      background-color: #2b7cd9 !important;
    }
    .error-msg {
      background-color: rgba(225, 82, 65, 0.1);
      border: 1px solid rgba(225, 82, 65, 0.3);
      color: #f27263;
      padding: 0.6rem;
      border-radius: 6px;
      font-size: 0.85rem;
      margin-top: 1rem;
    }

    /* 대시보드 UI 스타일 */
    .main-total-banner { background-color: #0b162c !important; border: 1px solid #172443 !important; border-radius: 8px; padding: 1.75rem 1.5rem; margin-bottom: 2rem; }
    .sync-status { display: inline-flex; align-items: center; gap: 6px; font-size: 0.75rem; font-weight: 600; color: #00e676 !important; }
    .sync-dot { width: 6px; height: 6px; background-color: #00e676; border-radius: 50%; box-shadow: 0 0 6px #00e676; animation: blink 2s infinite; }
    @keyframes blink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.75rem; margin-bottom: 2rem; }
    .grid-item { background-color: #0b162c !important; border: 1px solid #172443 !important; padding: 1rem; border-radius: 6px; border-top: 4px solid #58697f; }
    .grid-item .title { font-size: 0.8rem; font-weight: 600; color: #9aa5b5 !important; margin-bottom: 0.25rem; }
    .grid-item .amount { font-size: 1.05rem; font-weight: 700; color: #ffffff !important; }
    .grid-item .percent { font-size: 0.75rem; color: #6cb1ff; font-weight: 500; margin-left: 4px; }

    .accent-투자 { border-top-color: #e15241 !important; } 
    .accent-예금 { border-top-color: #418df1 !important; } 
    .accent-보험 { border-top-color: #26a69a !important; } 
    .accent-연금 { border-top-color: #ffb300 !important; } 
    .accent-기타 { border-top-color: #78889b !important; }

    .filter-sort-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; margin-bottom: 0.5rem; gap: 10px; flex-wrap: wrap; }
    .filter-tabs { display: flex; gap: 4px; }
    .filter-btn { background: #111e36; border: 1px solid #172443; color: #9aa5b5; padding: 0.4rem 0.8rem; font-size: 0.8rem; font-weight: 600; border-radius: 4px; }
    .filter-btn.active { background: #1e3152; color: #ffffff; border-color: #418df1; }
    .sort-select { background: #111e36; color: #ffffff; border: 1px solid #172443; padding: 0.4rem 1.8rem 0.4rem 0.8rem; font-size: 0.8rem; border-radius: 4px; cursor: pointer; }

    .table-container { background-color: #0b162c !important; border: 1px solid #172443 !important; border-radius: 8px; padding: 1rem; }
    .table { margin-bottom: 0; background-color: transparent !important; }
    .table th { font-weight: 600; color: #9aa5b5 !important; background-color: #111e36 !important; border-bottom: 1px solid #172443 !important; padding: 0.75rem 0.5rem; font-size: 0.85rem; white-space: nowrap; }
    .table td { padding: 0.85rem 0.5rem; border-bottom: 1px solid #172443 !important; color: #ffffff !important; background-color: transparent !important; font-size: 0.9rem; white-space: nowrap; }
    .table-hover tbody tr:hover td { background-color: #152441 !important; }

    .badge-asset { font-weight: 600; padding: 0.25rem 0.45rem; border-radius: 2px; font-size: 0.75rem; }
    .badge-투자 { background-color: rgba(225, 82, 65, 0.2) !important; color: #f27263 !important; }
    .badge-예금 { background-color: rgba(65, 141, 241, 0.2) !important; color: #6cb1ff !important; }
    .badge-보험 { background-color: rgba(38, 166, 154, 0.2) !important; color: #4db6ac !important; }
    .badge-연금 { background-color: rgba(255, 179, 0, 0.2) !important; color: #ffd54f !important; }
    .badge-기타 { background-color: rgba(120, 136, 155, 0.2) !important; color: #b0bec5 !important; }
    .section-title { font-size: 0.85rem; font-weight: 700; color: #9aa5b5 !important; }
  </style>
</head>
<body>

  <div id="lockScreen">
    <div class="lock-box text-center">
      <div class="lock-logo">UPBIT STYLE DASHBOARD</div>
      <h5 class="text-white fw-bold mb-2">보안 인증 시스템</h5>
      <p class="small mb-4" style="color: #9aa5b5;">금융 데이터 보호를 위해 비밀번호를 입력해 주세요.</p>
      
      <input type="password" id="passwordInput" class="form-control lock-input mb-4" placeholder="••••" maxlength="8" onkeydown="if(event.key==='Enter') verifyPassword()">
      <button class="btn btn-primary w-100 lock-btn" onclick="verifyPassword()">인증 및 자산 동기화</button>
      
      <div id="lockError" class="error-msg d-none">❌ 비밀번호가 올바르지 않습니다. 다시 입력하세요.</div>
    </div>
  </div>

  <div class="container d-none" id="mainDashboard">
    <div class="main-total-banner">
      <div class="row align-items-center">
        <div class="col-8 text-start">
          <div class="small fw-medium mb-1" style="color: #9aa5b5 !important;">총 보유자산</div>
          <div class="h2 fw-bold my-1 tracking-tight" id="grandTotalDisplay" style="font-size: 2.2rem; color: #e15241 !important;">0 KRW</div>
        </div>
        <div class="col-4 text-end">
          <div class="sync-status">
            <span class="sync-dot"></span>
            <span>보안 실시간 동기화</span>
          </div>
        </div>
      </div>
    </div>

    <div class="section-title mb-2">📊 보유 자산별 요약</div>
    <div class="summary-grid" id="summaryContainer"></div>

    <div class="filter-sort-row">
      <div class="section-title">🔍 자산별 상세 보유내역</div>
      <div class="filter-tabs" id="filterTabs">
        <button class="filter-btn active" onclick="filterCategory('전체')">전체</button>
        <button class="filter-btn" onclick="filterCategory('투자')">투자</button>
        <button class="filter-btn" onclick="filterCategory('예금')">예금</button>
        <button class="filter-btn" onclick="filterCategory('보험')">보험</button>
        <button class="filter-btn" onclick="filterCategory('연금')">연금</button>
      </div>
      <div>
        <select class="form-select sort-select" id="sortSelect" onchange="sortData()">
          <option value="default">기본 순 정렬</option>
          <option value="high">보유금액 높은 순</option>
          <option value="low">보유금액 낮은 순</option>
        </select>
      </div>
    </div>

    <div class="table-container">
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead>
            <tr>
              <th>자산명</th>
              <th>구분</th>
              <th class="text-end">보유금액(KRW)</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // 💡 구글에서 발급받으신 주소를 아래 큰따옴표 안에 꼭 넣어주세요!
    const MY_SECRET_URL = "여기에_방금_복사한_비밀_주소를_넣어주세요";

    let currentAssetList = []; 
    let currentCategoryFilter = '전체';

    async function verifyPassword() {
      const password = document.getElementById("passwordInput").value;
      const errorDiv = document.getElementById("lockError");
      
      // 초기 패스워드는 '1234'입니다.
      if (password === "1234") {
        // 🛠️ [버그 수정 완료] 오타로 유발되던 파싱 파괴 스크립트 에러 해결
        errorDiv.classList.add('d-none');
        document.getElementById("lockScreen").classList.add('d-none');
        document.getElementById("mainDashboard").classList.remove('d-none');
        await loadData();
      } else {
        errorDiv.classList.remove('d-none');
      }
    }

    function parseToNumber(val) {
      if(val === null || val === undefined) return 0;
      const strVal = val.toString().replace(/[^0-9.-]/g, ''); 
      if (strVal === '') return 0;
      const num = Number(strVal);
      return isNaN(num) ? 0 : num;
    }

    async function loadData() {
      try {
        const response = await fetch(MY_SECRET_URL + "?_=" + new Date().getTime());
        const json = await response.json();
        const rows = json.table?.rows || [];

        const targetCategories = ['투자', '예금', '보험', '연금'];
        const summaryMap = { '투자': 0, '예금': 0, '보험': 0, '연금': 0 };
        let otherTotal = 0;
        let grandTotal = 0; 
        
        currentAssetList = [];

        for (let i = 0; i < rows.length; i++) {
          if (!rows[i] || !rows[i].c) continue;
          const cells = rows[i].c;

          const assetVal = cells[0]?.v ? cells[0].v.toString().trim() : '';
          const categoryVal = cells[1]?.v ? cells[1].v.toString().trim() : '';
          const juneNum = parseToNumber(cells[2]?.v);

          if (
            assetVal === '자산' || 
            categoryVal === '구분' || 
            assetVal === '' || 
            assetVal.includes('계') || 
            categoryVal.includes('계')
          ) {
            continue; 
          }

          grandTotal += juneNum; 

          if (targetCategories.includes(categoryVal)) {
            summaryMap[categoryVal] += juneNum;
          } else {
            otherTotal += juneNum;
          }

          currentAssetList.push({
            asset: assetVal,
            category: categoryVal !== '' ? categoryVal : '기타',
            amount: juneNum,
            formattedAmount: juneNum.toLocaleString('ko-KR') + ' KRW'
          });
        }
        
        document.getElementById("grandTotalDisplay").innerHTML = `${grandTotal.toLocaleString('ko-KR')}<span class="fs-4 fw-normal" style="color: #9aa5b5 !important;"> KRW</span>`;

        let summaryHTML = '';
        targetCategories.forEach(category => {
          const totalVal = summaryMap[category] || 0;
          const percentage = grandTotal > 0 ? ((totalVal / grandTotal) * 100).toFixed(1) : 0;
          summaryHTML += `
            <div class="grid-item accent-${category}">
              <div class="title">${category}</div>
              <div class="amount">${totalVal.toLocaleString('ko-KR')}<span class="percent">${percentage}%</span></div>
            </div>
          `;
        });

        if (otherTotal > 0) {
          const otherPercentage = grandTotal > 0 ? ((otherTotal / grandTotal) * 100).toFixed(1) : 0;
          summaryHTML += `
            <div class="grid-item accent-기타">
              <div class="title">기타 자산</div>
              <div class="amount">${otherTotal.toLocaleString('ko-KR')}<span class="percent">${otherPercentage}%</span></div>
            </div>
          `;
        }
        document.getElementById("summaryContainer").innerHTML = summaryHTML;

        renderTable();

      } catch (error) {
        document.getElementById("tableBody").innerHTML = `<tr><td colspan="3" class="text-center text-danger py-5">⚠️ 보안 데이터 동기화 실패 또는 연동 오류</td></tr>`;
      }
    }

    function renderTable() {
      let filteredList = currentAssetList;
      if (currentCategoryFilter !== '전체') {
        filteredList = currentAssetList.filter(item => item.category === currentCategoryFilter);
      }

      const sortType = document.getElementById("sortSelect").value;
      if (sortType === 'high') filteredList.sort((a, b) => b.amount - a.amount);
      else if (sortType === 'low') filteredList.sort((a, b) => a.amount - b.amount);

      let bodyHTML = '';
      filteredList.forEach(item => {
        const targetCategories = ['투자', '예금', '보험', '연금'];
        const badgeClass = targetCategories.includes(item.category) ? `badge-${item.category}` : 'badge-기타';

        bodyHTML += '<tr>';
        bodyHTML += `<td class="fw-semibold text-white text-wrap" style="white-space: normal; min-width: 120px;">${item.asset}</td>`; 
        bodyHTML += `<td><span class="badge-asset ${badgeClass}">${item.category}</span></td>`;
        bodyHTML += `<td class="text-end fw-bold text-white">${item.formattedAmount}</td>`;
        bodyHTML += '</tr>';
      });

      document.getElementById("tableBody").innerHTML = bodyHTML || `<tr><td colspan="3" class="text-center py-4" style="color:#9aa5b5;">내역이 없습니다.</td></tr>`;
    }

    function filterCategory(category) {
      currentCategoryFilter = category;
      const buttons = document.querySelectorAll('#filterTabs .filter-btn');
      buttons.forEach(btn => {
        if (btn.innerText === category) btn.classList.add('active');
        else btn.classList.remove('active');
      });
      renderTable();
    }

    function sortData() { renderTable(); }
  </script>
</body>
</html>
