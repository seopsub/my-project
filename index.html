<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자산관리 Dashboard - Upbit Style</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
  
  <style>
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: #091224; /* 💙 업비트 특유의 깊은 다크 네이비 배경 */
      color: #ffffff;
      padding-top: 2rem;
      padding-bottom: 3rem;
    }
    .container {
      max-width: 800px;
    }
    
    /* 🏆 업비트 스타일 자산 총액 배너 */
    .main-total-banner {
      background-color: #0b162c; /* 살짝 밝은 네이비 섹션 분리 */
      border: 1px solid #172443;
      border-radius: 8px; /* 업비트는 라운딩을 과하게 주지 않고 깔끔하게 떨어뜨림 */
      padding: 1.75rem 1.5rem;
      margin-bottom: 1.5rem;
    }

    /* 🟢 실시간 동기화 네온 점 */
    .sync-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #00e676; /* 형광 그린 */
      letter-spacing: 0.5px;
    }
    .sync-dot {
      width: 6px;
      height: 6px;
      background-color: #00e676;
      border-radius: 50%;
      box-shadow: 0 0 6px #00e676;
      animation: blink 2s infinite;
    }
    @keyframes blink {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }

    /* 차트와 요약 카드를 품는 대시보드 섹션 */
    .dashboard-row {
      background-color: #0b162c;
      border: 1px solid #172443;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .chart-box {
      max-width: 180px;
      margin: 0 auto;
    }

    .summary-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      justify-content: center;
    }
    
    /* 업비트 호가창/자산 탭 느낌의 아이템 열 */
    .mini-bar-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #111e36;
      padding: 0.6rem 1rem;
      border-radius: 4px;
      border-left: 4px solid #58697f;
    }
    .mini-bar-item .title { font-size: 0.85rem; font-weight: 600; color: #9aa5b5; }
    .mini-bar-item .amount { font-size: 0.95rem; font-weight: 700; color: #ffffff; }

    /* 📊 업비트 거래소 시그니처 테마 컬러 매칭 (투자=강렬한 상승 레드, 예금=안정적인 블루) */
    .border-투자 { border-left-color: #e15241; } /* 업비트 상승 레드 */
    .border-예금 { border-left-color: #418df1; } /*
