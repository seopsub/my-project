<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Google Sheets 조회</title>
</head>
<body>
  <h1>내 Google Sheets 데이터</h1>
  <div id="output"></div>

  <script>
    // Google Sheets API 키 (발급받은 키로 교체하세요)
    const API_KEY = "YOUR_API_KEY";

    // 스프레드시트 ID (주소에서 추출)
    const SPREADSHEET_ID = "1sLDzNjAnvVhMCctNZgttP6daktZalRVWfolCx9XciT8";

    // 조회할 범위 (예: Sheet1의 A1:D10)
    const RANGE = "Sheet1!A1:D10";

    async function loadSheet() {
      const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${RANGE}?key=${API_KEY}`;
      const response = await fetch(url);
      const data = await response.json();

      const outputDiv = document.getElementById("output");
      outputDiv.innerHTML = "<table border='1'>" +
        data.values.map(row => 
          "<tr>" + row.map(cell => `<td>${cell}</td>`).join("") + "</tr>"
        ).join("") +
        "</table>";
    }

    loadSheet();
  </script>
</body>
</html>
