<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자산관리 Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: #f3f4f6;
      color: #1f2937;
      padding-top: 2rem;
      padding-bottom: 3rem;
    }
    .container {
      max-width: 800px;
    }
    
    /* 🏆 핀테크 앱 스타일 프리미엄 메인 총합계 배너 */
    .main-total-banner {
      background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
      color: #ffffff;
      border-radius: 28px;
      padding: 2.5rem 1.5rem;
      box-shadow: 0 20px 40px -15px rgba(15, 23, 42, 0.3);
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
    }
    /* 고급스러운 메탈릭 광택 효과 배경 레이어 */
    .main-total-banner::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 70%);
      pointer-events: none;
    }

    /* 🟢 시인성 개선: 실시간 동기화 네온 점 & 텍스트 */
    .sync-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #cbd5e1; /* 글자색을 밝게 하여 시인성 확보 */
      letter-spacing: 0.5px;
    }
    .sync-dot {
      width: 7px;
      height: 7px;
      background-color: #10b981; /* 선명한 네온 그린 */
      border-radius: 50%;
      box-shadow: 0 0 8px #10b981;
      animation: blink 2s infinite;
    }
    @keyframes blink {
      0% { opacity: 0.3; }
      50% { opacity: 1; }
      100% { opacity: 0.3; }
    }

    /* 가로 스크롤 컨테이너 */
    .scroll-container {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      padding-bottom: 1rem;
    }
    .scroll-container::-webkit-scrollbar {
      height: 6px;
    }
    .scroll-container::-webkit-scrollbar-thumb {
      background-color: #cbd5e1;
      border-radius: 3px;
    }
    
    .card-summary {
      flex: 0 0 160px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 1.25rem 1rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
    }

    /* 테이블 스타일 */
    .table-container {
      background-color: #ffffff;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
      padding: 1.25rem;
      margin-top: 1rem;
    }
    .table th {
      font-weight: 600;
      color: #6b7280;
      background-color: #f9fafb !important;
      border-bottom: 1px solid #e5e7eb;
      padding: 0.85rem 0.5rem;
      font-size: 0.9rem;
      white-space: nowrap;
    }
    .table td {
      padding: 1rem 0.5rem;
      border-bottom: 1px solid #f3f4f6;
      color: #111827;
      font-size: 0.95rem;
      white-space: nowrap;
    }

    /* 파스텔 배지 */
    .badge-asset {
      font-weight: 500;
      padding: 0.3rem 0.5rem;
      border-radius: 6px;
      font-size: 0.8rem;
    }
    .badge-보험 { background-color: #eff6ff; color: #1d4ed8; }
    .badge-예금 { background-color: #ecfdf5; color: #047857; }
    .badge-연금 { background-color: #fffbeb; color: #b45309; }
    .badge-투자 { background-color: #fef2f2; color: #b91c1c; }
    .badge-기타 { background-color: #f3f4f6; color: #4b5563; }

    .accent-보험 { border-top: 4px solid #3b82f6; }
    .accent-예금 { border-top: 4px solid #10b981; }
    .accent-연금 { border-top: 4px solid #f59e0b; }
    .accent-투자 { border-top: 4px solid #ef4444; }
    .accent-기타 { border-top: 4px solid #6b7280; }
  </style>
</head>
<body>

  <div class="container">
    
    <div class="main-total-banner text-center">
      <div class="text-white-50 small fw-semibold text-uppercase tracking-wide mb-2" style="letter-spacing: 1px;">나의 총 자산 현황</div>
      <div class="display-4 fw-bold text-white my-3 tracking-tight" id="grandTotalDisplay" style="font-size: 2.8rem;">0원</div>
      
      <div class="sync-status">
        <span class="sync-dot"></span>
        <span>LIVE SYNC</span>
      </div>
    </div>
