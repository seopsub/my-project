<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자산관리 Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: #f3f4f6; /* 약간 더 차분한 그레이 배경 */
      color: #1f2937;
      padding-top: 2rem;
      padding-bottom: 3rem;
    }
    .container {
      max-width: 800px; /* 모바일/태블릿 가독성을 위해 슬림하게 조정 */
    }
    
    /* 🏆 전체 총합계 메인 배너 스타일 (핀테크 앱 스타일) */
    .main-total-banner {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      color: #ffffff;
      border-radius: 24px;
      padding: 2rem 1.5rem;
      box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.15);
      margin-bottom: 2rem;
    }

    /* 📱 모바일용 가로 스크롤 컨테이너 (옆으로 넘겨보는 카드) */
    .scroll-container {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      padding-bottom: 1rem;
      margin-left: -1rem;  /* 모바일 화면 꽉 차게 스크롤 되도록 여백 조정 */
      margin-right: -1rem;
      padding-left: 1rem;
      padding-right: 1rem;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .scroll-container::-webkit-scrollbar {
      display: none; /* 스크롤바 숨기기 (깔끔하게) */
    }
    
    .card-summary {
      flex: 0 0 160px; /* 모바일에서 한눈에 여러 개가 걸치도록 너비 고정 */
      scroll-snap-align: start;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 1.25rem 1rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0
