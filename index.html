<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자산관리 CMMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
      padding-top: 2rem;
    }
    .container {
      max-width: 1000px;
    }
    .table-container {
      background-color: #ffffff;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      padding: 1.5rem;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="d-flex justify-content-between align-items-center border-bottom pb-3">
      <h1 class="h2 text-primary fw-bold">⚙️ 자산관리 프로그램</h1>
      <span class="badge bg-secondary">구글 시트 연동중</span>
    </div>

    <div class="table-container">
      <div class="table-responsive">
        <table class="table table-hover align-middle" id="assetTable">
          <thead class="table-dark">
            <tr id="tableHead">
              </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="100%" class="text-center text-muted py-4">
                <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>
                데이터를 불러오는 중입니다...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    async function loadData() {
      try {
        const url = "https://docs.google.com/spreadsheets/d/1sLDzNjAnvVhMCctNZgttP6daktZalRVWfolCx9XciT8/gviz/tq?tqx=out:json";
        const response = await fetch(url);
        const text = await response.text();
        
        // 구글 시트 JSON 파싱
        const json = JSON.parse(text.substr(47).slice(0, -2));
        const rows = json.table.rows;

        if (rows.length === 0) {
          document.getElementById("tableBody").innerHTML = `<tr><td class="text-center py-4">데이터가 없습니다.</td></tr>`;
          return;
        }

        // 1. 헤더 생성 (첫 번째 행 데이터 기준)
        const firstRow = rows[0].c;
        const headHTML = firstRow.map(cell => `<th>${cell?.v ?? ''}</th>`).join('');
        document.getElementById("tableHead").innerHTML = headHTML;

        // 2. 데이터 행 생성 (두 번째 행부터 반복)
        let bodyHTML = '';
        for (let i = 1; i < rows.length; i++) {
          const cells = rows[i].c;
          bodyHTML += '<tr>';
          cells.forEach(cell => {
            let val = cell?.v ?? '';
            
            // 상태에 따라 배지(Badge) 스타일 적용해보기 (예시)
            if (val === '가동중') {
              bodyHTML += `<td><span class="badge bg-success">${val}</span></td>`;
            } else if (val === '수리중') {
              bodyHTML += `<td><span class="badge bg-danger">${val}</span></td>`;
            } else {
              bodyHTML += `<td>${val}</td>`;
            }
          });
          bodyHTML += '</tr>';
        }
        
        document.getElementById("tableBody").innerHTML = bodyHTML;

      } catch (error) {
        console.error("데이터 로드 실패:", error);
        document.getElementById("tableBody").innerHTML = `<tr><td class="text-center text-danger py-4">데이터를 불러오지 못했습니다. 시트 권한을 확인하세요.</td></tr>`;
      }
    }

    // 페이지 로드 시 실행
    window.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
