<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자산관리 Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: #f3f4f6;
      color: #1f2937;
      padding-top: 2rem;
      padding-bottom: 3rem;
    }
    .container {
      max-width: 800px;
    }
    
    /* 🏆 메인 총합계 배너 */
    .main-total-banner {
      background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
      color: #ffffff;
      border-radius: 24px;
      padding: 2.5rem 1.5rem;
      box-shadow: 0 20px 40px -15px rgba(15, 23, 42, 0.3);
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
    }
    .main-total-banner::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 70%);
      pointer-events: none;
    }

    /* 🟢 실시간 동기화 네온 점 & 텍스트 */
    .sync-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #cbd5e1;
      letter-spacing: 0.5px;
    }
    .sync-dot {
      width: 7px;
      height: 7px;
      background-color: #10b981;
      border-radius: 50%;
      box-shadow: 0 0 8px #10b981;
      animation: blink 2s infinite;
    }
    @keyframes blink {
      0% { opacity: 0.3; }
      50% { opacity: 1; }
      100% { opacity: 0.3; }
    }

    /* 가로 스크롤 컨테이너 */
    .scroll-container {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      padding-bottom: 1rem;
    }
    .scroll-container::-webkit-scrollbar {
      height: 6px;
    }
    .scroll-container::-webkit-scrollbar-thumb {
      background-color: #cbd5e1;
      border-radius: 3px;
    }
    
    .card-summary {
      flex: 0 0 160px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 1.25rem 1rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
    }

    /* 테이블 스타일 */
    .table-container {
      background-color: #ffffff;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
      padding: 1.25rem;
      margin-top: 1rem;
    }
    .table th {
      font-weight: 600;
      color: #6b7280;
      background-color: #f9fafb !important;
      border-bottom: 1px solid #e5e7eb;
      padding: 0.85rem 0.5rem;
      font-size: 0.9rem;
      white-space: nowrap;
    }
    .table td {
      padding: 1rem 0.5rem;
      border-bottom: 1px solid #f3f4f6;
      color: #111827;
      font-size: 0.95rem;
      white-space: nowrap;
    }

    /* 파스텔 배지 */
    .badge-asset {
      font-weight: 500;
      padding: 0.3rem 0.5rem;
      border-radius: 6px;
      font-size: 0.8rem;
    }
    .badge-보험 { background-color: #eff6ff; color: #1d4ed8; }
    .badge-예금 { background-color: #ecfdf5; color: #047857; }
    .badge-연금 { background-color: #fffbeb; color: #b45309; }
    .badge-투자 { background-color: #fef2f2; color: #b91c1c; }
    .badge-기타 { background-color: #f3f4f6; color: #4b5563; }

    .accent-보험 { border-top: 4px solid #3b82f6; }
    .accent-예금 { border-top: 4px solid #10b981; }
    .accent-연금 { border-top: 4px solid #f59e0b; }
    .accent-투자 { border-top: 4px solid #ef4444; }
    .accent-기타 { border-top: 4px solid #6b7280; }
  </style>
</head>
<body>

  <div class="container">
    
    <div class="main-total-banner text-center">
      <div class="text-white-50 small fw-semibold text-uppercase tracking-wide mb-2" style="letter-spacing: 1px;">나의 총 자산 현황</div>
      <div class="display-4 fw-bold text-white my-3 tracking-tight" id="grandTotalDisplay" style="font-size: 2.8rem;">0원</div>
      
      <div class="sync-status">
        <span class="sync-dot"></span>
        <span>LIVE SYNC</span>
      </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-2">
      <h3 class="fs-6 fw-bold text-secondary m-0">항목별 요약</h3>
    </div>
    <div class="scroll-container mb-4" id="summaryContainer">
      <div class="text-muted small p-2">데이터를 불러오는 중입니다...</div>
    </div>

    <h3 class="fs-6 fw-bold text-secondary mb-2">상세 자산 내역</h3>
    <div class="table-container">
      <div class="table-responsive">
        <table class="table align-middle" id="assetTable">
          <thead>
            <tr>
              <th>자산명</th>
              <th>구분</th>
              <th class="text-end">금액</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="3" class="text-center text-muted py-5">
                <div class="spinner-border spinner-border-sm text-secondary me-2" role="status"></div>
                자산 정보를 파싱하고 있습니다...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // 강제 고정된 인덱스 정의
    const ASSET_COLUMN_INDEX = 0;    
    const CATEGORY_COLUMN_INDEX = 1; 
    const JUNE_COLUMN_INDEX = 2;     

    // 💡 방어 코드가 적용된 숫자 파싱 함수
    function parseToNumber(cell) {
      if (!cell || cell.v === null || cell.v === undefined) return 0;
      // 값에 문자가 섞여있어도 순수 숫자와 소수점만 추출
      let str = cell.v.toString().replace(/[^0-9.-]/g, ''); 
      if (str === '') return 0;
      const num = Number(str);
      return isNaN(num) ? 0 : num;
    }

    // 💡 안전한 통화 포맷팅 함수
    function formatCurrency(cell) {
      if (!cell || cell.v === null || cell.v === undefined || cell.v === '') return '0 원';
      if (cell.f) return cell.f + ' 원'; // 구글 시트 포맷이 이미 있다면 활용
      const num = parseToNumber(cell);
      return num.toLocaleString('ko-KR') + ' 원';
    }

    async function loadData() {
      try {
        const url = "https://docs.google.com/spreadsheets/d/1sLDzNjAnvVhMCctNZgttP6daktZalRVWfolCx9XciT8/gviz/tq?tqx=out:json&_=" + new Date().getTime();
        const response = await fetch(url);
        const text = await response.text();
        
        // JSON 추출 파싱 단계
        const json = JSON.parse(text.substr(47).slice(0, -2));
        
        // 💡 버그 방어선 1: table이나 rows가 아예 없을 때 죽는 것 방지
        if (!json || !json.table || !json.table.rows) {
          document.getElementById("tableBody").innerHTML = `<tr><td colspan="3" class="text-center py-4">구글 시트 데이터 구조를 읽을 수 없습니다.</td></tr>`;
          return;
        }
        
        const rows = json.table.rows;
        if (rows.length === 0) {
          document.getElementById("tableBody").innerHTML = `<tr><td colspan="3" class="text-center py-4">데이터가 비어 있습니다.</td></tr>`;
          return;
        }

        const targetCategories = ['보험', '예금', '연금', '투자'];
        const summaryMap = { '보험': 0, '예금': 0, '연금': 0, '투자': 0 };
        let otherTotal = 0;
        let grandTotal = 0; 

        let bodyHTML = '';

        for (let i = 0; i < rows.length; i++) {
          // 💡 버그 방어선 2: 행 자체가 null이거나 내부 c 배열이 깨져있을 때 스킵
          if (!rows[i] || !rows[i].c) continue;
          const cells = rows[i].c;

          // 💡 버그 방어선 3: Optional Chaining (?.) 기법을 도입하여 칸이 아예 개설 안 되어 있어도 에러 안 나게 방어
          const cellAsset = cells[ASSET_COLUMN_INDEX];
          const cellCategory = cells[CATEGORY_COLUMN_INDEX];
          const cellJune = cells[JUNE_COLUMN_INDEX];

          const assetVal = cellAsset && cellAsset.v !== null ? cellAsset.v.toString().trim() : '';
          const categoryVal = cellCategory && cellCategory.v !== null ? cellCategory.v.toString().trim() : '';

          // 첫 줄 글자 헤더나 빈 행, '계' 제거 조건 필터
          if (assetVal === '자산' || categoryVal === '구분' || assetVal.includes('계') || categoryVal.includes('계') || (assetVal === '' && categoryVal === '')) {
            continue; 
          }

          const juneNum = parseToNumber(cellJune);
          grandTotal += juneNum; 

          if (targetCategories.includes(categoryVal)) {
            summaryMap[categoryVal] += juneNum;
          } else if (categoryVal !== '') {
            otherTotal += juneNum;
          }

          const badgeClass = targetCategories.includes(categoryVal) ? `badge-${categoryVal}` : 'badge-기타';

          bodyHTML += '<tr>';
          bodyHTML += `<td class="fw-semibold text-dark text-wrap" style="white-space: normal; min-width: 120px;">${assetVal || '-'}</td>`; 
          bodyHTML += `<td><span class="badge-asset ${badgeClass}">${categoryVal || '미분
