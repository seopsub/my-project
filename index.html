<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>통합 자산관리 Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: #091224 !important; /* 💙 업비트 시그니처 다크 네이비 */
      color: #ffffff !important;
      padding-top: 1rem;
      padding-bottom: 3rem;
      /* 🛠️ [고도화] 모바일 스와이프 시 브라우저 기본 당겨서 새로고침(Pull-to-refresh) 현상 방어 */
      overscroll-behavior-y: contain; 
    }
    .container { max-width: 800px; }
    
    /* 🔒 잠금 화면 UI */
    #lockScreen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-color: #091224; z-index: 9999;
      display: flex; justify-content: center; align-items: center; padding: 20px;
    }
    .lock-box {
      background-color: #0b162c; border: 1px solid #1a2e56; 
      padding: 3rem 2rem; border-radius: 12px; width: 100%; max-width: 420px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      position: relative;
    }
    .lock-logo { font-size: 1.5rem; font-weight: 800; color: #418df1; letter-spacing: -0.5px; margin-bottom: 0.5rem; }
    .lock-input {
      background: #111e36 !important; color: #ffffff !important; border: 1px solid #223a66 !important;
      text-align: center; font-size: 1.3rem; letter-spacing: 6px; padding: 0.75rem !important; border-radius: 6px !important;
    }
    .lock-input:focus { border-color: #418df1 !important; box-shadow: 0 0 0 3px rgba(65, 141, 241, 0.2) !important; }
    .lock-btn { 
      background-color: #418df1 !important; border: none !important; font-weight: 700; color: #ffffff !important; 
      padding: 0.85rem !important; font-size: 1rem; border-radius: 6px !important;
    }
    .error-msg { background-color: rgba(225, 82, 65, 0.1); border: 1px solid rgba(225, 82, 65, 0.3); color: #f27263; padding: 0.6rem; border-radius: 6px; font-size: 0.85rem; margin-top: 1rem; }

    .build-version {
      position: absolute; bottom: 12px; right: 16px;
      font-size: 0.7rem; color: #4e5b73; font-weight: 600; letter-spacing: 0.5px;
    }

    /* ⚡ 업비트 스타일 최상단 메인 탭 메뉴 */
    .main-nav-tabs {
      display: flex; background-color: #0b162c; border: 1px solid #172443; border-radius: 8px; padding: 4px; margin-bottom: 1.5rem;
    }
    .nav-tab-btn {
      flex: 1; background: transparent; border: none; color: #9aa5b5; font-weight: 700; padding: 0.75rem; font-size: 0.95rem; border-radius: 6px; transition: all 0.2s;
    }
    .nav-tab-btn:hover { color: #ffffff; }
    .nav-tab-btn.active { background-color: #111e36; color: #418df1; border: 1px solid #172443; }

    /* 대시보드 UI 스타일 */
    .main-total-banner { background-color: #0b162c !important; border: 1px solid #172443 !important; border-radius: 8px; padding: 1.75rem 1.5rem; margin-bottom: 1.5rem; }
    .sync-status { display: inline-flex; align-items: center; gap: 5px; font-size: 0.75rem; font-weight: 600; color: #00e676 !important; white-space: nowrap; }
    .sync-dot { width: 6px; height: 6px; background-color: #00e676; border-radius: 50%; box-shadow: 0 0 6px #00e676; animation: blink 2s infinite; }
    @keyframes blink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

    @media (max-width: 576px) {
      #grandTotalDisplay { font-size: 1.8rem !important; }
      .sync-status { font-size: 0.7rem; }
    }

    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
    .grid-item { background-color: #0b162c !important; border: 1px solid #172443 !important; padding: 1rem; border-radius: 6px; border-top: 4px solid #58697f; }
    .grid-item .title { font-size: 0.85rem; font-weight: 600; color: #9aa5b5 !important; margin-bottom: 0.25rem; }
    .grid-item .amount { font-size: 1.15rem; font-weight: 700; color: #ffffff !important; }
    .grid-item .percent { font-size: 0.8rem; color: #6cb1ff; font-weight: 500; margin-left: 4px; }

    .accent-유동자산 { border-top-color: #e15241 !important; } 
    .accent-비유동자산 { border-top-color: #418df1 !important; } 
    .accent-기타자산 { border-top-color: #78889b !important; }

    .filter-sort-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; margin-bottom: 0.5rem; gap: 10px; flex-wrap: wrap; }
    .filter-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
    .filter-btn { background: #111e36; border: 1px solid #172443; color: #9aa5b5; padding: 0.4rem 0.8rem; font-size: 0.8rem; font-weight: 600; border-radius: 4px; }
    .filter-btn.active { background: #1e3152; color: #ffffff; border-color: #418df1; }
    .sort-select { background: #111e36; color: #ffffff; border: 1px solid #172443; padding: 0.4rem 1.8rem 0.4rem 0.8rem; font-size: 0.8rem; border-radius: 4px; cursor: pointer; }

    .table-container { background-color: #0b162c !important; border: 1px solid #172443 !important; border-radius: 8px; padding: 1rem; }
    .table { margin-bottom: 0; background-color: transparent !important; }
    .table th { font-weight: 600; color: #9aa5b5 !important; background-color: #111e36 !important; border-bottom: 1px solid #172443 !important; padding: 0.75rem 0.5rem; font-size: 0.85rem; white-space: nowrap; }
    .table td { padding: 0.85rem 0.5rem; border-bottom: 1px solid #172443 !important; color: #ffffff !important; background-color: transparent !important; font-size: 0.9rem; white-space: nowrap; }
    .table-hover tbody tr:hover td { background-color: #152441 !important; }

    .badge-asset { font-weight: 600; padding: 0.25rem 0.45rem; border-radius: 2px; font-size: 0.75rem; }
    .badge-유동자산 { background-color: rgba(225, 82, 65, 0.2) !important; color: #f27263 !important; }
    .badge-비유동자산 { background-color: rgba(65, 141, 241, 0.2) !important; color: #6cb1ff !important; }
    .badge-기타 { background-color: rgba(120, 136, 155, 0.2) !important; color: #b0bec5 !important; }
    .section-title { font-size: 0.85rem; font-weight: 700; color: #9aa5b5 !important; }
  </style>
</head>
<body>

  <div id="lockScreen">
    <div class="lock-box text-center">
      <div class="lock-logo">UPBIT STYLE DASHBOARD</div>
      <h5 class="text-white fw-bold mb-2">보안 인증 시스템</h5>
      <p class="small mb-4" style="color: #9aa5b5;">금융 데이터 보호를 위해 비밀번호를 입력해 주세요.</p>
      
      <input type="password" id="passwordInput" class="form-control lock-input mb-4" placeholder="••••" maxlength="8" onkeydown="if(event.key==='Enter') verifyPassword()">
      <button class="btn btn-primary w-100 lock-btn" onclick="verifyPassword()">인증 및 자산 동기화</button>
      
      <div id="lockError" class="error-msg d-none">❌ 비밀번호가 올바르지 않습니다. 다시 입력하세요.</div>
      
      <div class="build-version">BUILD v1.2.0</div>
    </div>
  </div>

  <div class="container d-none" id="mainDashboard">
    
    <div class="main-nav-tabs" id="mainNavTabs">
      <button class="nav-tab-btn active" onclick="switchMainTab('sheet1')">MY ASSET</button>
      <button class="nav-tab-btn" onclick="switchMainTab('sheet2')">OUR ASSET</button>
    </div>

    <div class="main-total-banner">
      <div class="row align-items-center">
        <div class="col-7 col-sm-8 text-start">
          <div class="small fw-medium mb-1" id="totalBannerTitle" style="color: #9aa5b5 !important;">총 보유자산</div>
          <div class="h2 fw-bold my-1 tracking-tight" id="grandTotalDisplay" style="font-size: 2.2rem; color: #e15241 !important;">0 KRW</div>
        </div>
        <div class="col-5 col-sm-4 text-end">
          <div class="sync-status">
            <span class="sync-dot"></span>
            <span>LIVE</span>
          </div>
        </div>
      </div>
    </div>

    <div class="section-title mb-2">📊 보유 자산별 요약</div>
    <div class="summary-grid" id="summaryContainer"></div>

    <div class="filter-sort-row">
      <div class="section-title">🔍 자산별 상세 보유내역</div>
      <div class="filter-tabs" id="subFilterTabs"></div>
      <div>
        <select class="form-select sort-select" id="sortSelect" onchange="sortData()">
          <option value="default">기본 순 정렬</option>
          <option value="high">보유금액 높은 순</option>
          <option value="low">보유금액 낮은 순</option>
        </select>
      </div>
    </div>

    <div class="table-container">
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead>
            <tr>
              <th>자산명</th>
              <th>구분</th>
              <th class="text-end">보유금액(KRW)</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const MY_SECRET_URL = "https://script.google.com/macros/s/AKfycby1-ba2LYYB_ZZLkHMhRgNJ71k-xWmiHUCFzTxyg4qdJdFdqo1XAqw_SYfSFCfTnEwQ/exec"; 
    // 💡 실제 사용 시 본인의 완벽한 구글 웹 앱 URL 주소 "https://script.google.com/macros/s/AKfycbySYNatGZ6sgXmjZsl5QN-HWOMFuSDpqCgqgzWBOG0T7RoLPaJjfQuV5BK9lb988vJq/exec"를 복사해서 이 따옴표 안에 집어넣어주세요!

    let rawServerData = null; 
    let currentTabKey = 'sheet1'; 
    let currentAssetList = []; 
    let currentCategoryFilter = '전체';

    // 🛠️ [고도화] 터치 스와이프 제스처 변수 선언
    let touchStartX = 0;
    let touchEndX = 0;

    async function verifyPassword() {
      const password = document.getElementById("passwordInput").value;
      const errorDiv = document.getElementById("lockError");
      
      if (password === "1235") {
        errorDiv.classList.add('d-none');
        document.getElementById("lockScreen").classList.add('d-none');
        document.getElementById("mainDashboard").classList.remove('d-none');
        await loadServerData();
        
        // 🛠️ [고도화] 대시보드가 인증 오픈된 직후 터치 제스처 스와이프 리스너 가동
        initSwipeGesture();
      } else {
        errorDiv.classList.remove('d-none');
      }
    }

    // 🛠️ [고도화] 손가락 좌우 드래그 스와이프 감지 엔진 함수
    function initSwipeGesture() {
      const dashboard = document.getElementById("mainDashboard");
      
      dashboard.addEventListener('touchstart', (e) => {
        // 셀렉트 박스나 가로 스크롤 테이블 안에서의 간섭을 막기 위한 예외 처리
        if (e.target.closest('select') || e.target.closest('.table-responsive')) return;
        touchStartX = e.changedTouches[0].screenX;
      }, { passive: true });

      dashboard.addEventListener('touchend', (e) => {
        if (e.target.closest('select') || e.target.closest('.table-responsive')) return;
        touchEndX = e.changedTouches[0].screenX;
        handleSwipeAction();
      }, { passive: true });
    }

    // 왼쪽/오른쪽 방향 연산 및 탭 전환 격발 함수
    function handleSwipeAction() {
      const swipeDistance = touchEndX - touchStartX;
      const swipeThreshold = 80; // 스와이프로 인정할 최소 픽셀 거리 (너무 민감하게 반응하지 않도록 세팅)

      // 슥 밀었을 때 탭 위치 스위칭 연동
      if (Math.abs(swipeDistance) > swipeThreshold) {
        if (swipeDistance > 0 && currentTabKey === 'sheet2') {
          // 👉 오른쪽으로 밀었을 때: MY ASSET으로 이동
          switchMainTab('sheet1');
        } else if (swipeDistance < 0 && currentTabKey === 'sheet1') {
          // 👈 왼쪽으로 밀었을 때: OUR ASSET으로 이동
          switchMainTab('sheet2');
        }
      }
    }

    function parseToNumber(val) {
      if(val === null || val === undefined) return 0;
      const strVal = val.toString().replace(/[^0-9.-]/g, ''); 
      if (strVal === '') return 0;
      const num = Number(strVal);
      return isNaN(num) ? 0 : num;
    }

    async function loadServerData() {
      try {
        const response = await fetch(MY_SECRET_URL + "?_=" + new Date().getTime());
        rawServerData = await response.json();
        switchMainTab('sheet1');
      } catch (error) {
        document.getElementById("tableBody").innerHTML = `<tr><td colspan="3" class="text-center text-danger py-5">⚠️ 데이터 동기화 실패 또는 연동 오류</td></tr>`;
      }
    }

    function switchMainTab(tabKey) {
      currentTabKey = tabKey;
      currentCategoryFilter = '전체';
      
      const tabs = document.querySelectorAll('#mainNavTabs .nav-tab-btn');
      tabs[tabKey === 'sheet1' ? 0 : 1].classList.add('active');
      tabs[tabKey === 'sheet1' ? 1 : 0].classList.remove('active');

      document.getElementById("totalBannerTitle").innerText = tabKey === 'sheet1' ? "나의 총 보유자산" : "공동 및 배우자 총 자산";

      processAndRenderData();
    }

    function processAndRenderData() {
      if (!rawServerData || !rawServerData[currentTabKey]) return;
      
      const rows = rawServerData[currentTabKey].table?.rows || [];
      currentAssetList = [];

      const targetCategories = ['유동자산', '비유동자산'];
      const summaryMap = { '유동자산': 0, '비유동자산': 0 };
      let otherTotal = 0;
      let grandTotal = 0;

      const uniqueCategories = new Set();

      for (let i = 0; i < rows.length; i++) {
        if (!rows[i] || !rows[i].c) continue;
        const cells = rows[i].c;

        const assetVal = cells[0]?.v ? cells[0].v.toString().trim() : '';
        const categoryVal = cells[1]?.v ? cells[1].v.toString().trim() : '';
        const amountNum = parseToNumber(cells[2]?.v);

        if (
          assetVal === '자산' || categoryVal === '구분' || assetVal === '' || 
          assetVal.includes('계') || categoryVal.includes('계')
        ) {
          continue; 
        }

        grandTotal += amountNum;
        if (categoryVal !== '') uniqueCategories.add(categoryVal);

        if (targetCategories.includes(categoryVal)) {
          summaryMap[categoryVal] += amountNum;
        } else {
          otherTotal += amountNum;
        }

        currentAssetList.push({
          asset: assetVal,
          category: categoryVal !== '' ? categoryVal : '기타',
          amount: amountNum,
          formattedAmount: amountNum.toLocaleString('ko-KR') + ' KRW'
        });
      }

      document.getElementById("grandTotalDisplay").innerHTML = `${grandTotal.toLocaleString('ko-KR')}<span class="fs-4 fw-normal" style="color: #9aa5b5 !important;"> KRW</span>`;

      let summaryHTML = '';
      targetCategories.forEach(category => {
        const totalVal = summaryMap[category] || 0;
        const percentage = grandTotal > 0 ? ((totalVal / grandTotal) * 100).toFixed(1) : 0;
        summaryHTML += `
          <div class="grid-item accent-${category}">
            <div class="title">${category}</div>
            <div class="amount">${totalVal.toLocaleString('ko-KR')}<span class="percent">${percentage}%</span></div>
          </div>
        `;
      });

      if (otherTotal > 0) {
        const otherPercentage = grandTotal > 0 ? ((otherTotal / grandTotal) * 100).toFixed(1) : 0;
        summaryHTML += `
          <div class="grid-item accent-기타자산">
            <div class="title">기타 자산</div>
            <div class="amount">${otherTotal.toLocaleString('ko-KR')}<span class="percent">${otherPercentage}%</span></div>
          </div>
        `;
      }
      document.getElementById("summaryContainer").innerHTML = summaryHTML;

      let filterHTML = `<button class="filter-btn active" onclick="filterCategory('전체')">전체</button>`;
      uniqueCategories.forEach(cat => {
        filterHTML += `<button class="filter-btn" onclick="filterCategory('${cat}')">${cat}</button>`;
      });
      document.getElementById("subFilterTabs").innerHTML = filterHTML;

      renderTable();
    }

    function renderTable() {
      let filteredList = currentAssetList;
      if (currentCategoryFilter !== '전체') {
        filteredList = currentAssetList.filter(item => item.category === currentCategoryFilter);
      }

      const sortType = document.getElementById("sortSelect").value;
      if (sortType === 'high') filteredList.sort((a, b) => b.amount - a.amount);
      else if (sortType === 'low') filteredList.sort((a, b) => a.amount - b.amount);

      let bodyHTML = '';
      filteredList.forEach(item => {
        const coreCategories = ['유동자산', '비유동자산'];
        const badgeClass = coreCategories.includes(item.category) ? `badge-${item.category}` : 'badge-기타';

        bodyHTML += '<tr>';
        bodyHTML += `<td class="fw-semibold text-white text-wrap" style="white-space: normal; min-width: 120px;">${item.asset}</td>`; 
        bodyHTML += `<td><span class="badge-asset ${badgeClass}">${item.category}</span></td>`;
        bodyHTML += `<td class="text-end fw-bold text-white">${item.formattedAmount}</td>`;
        bodyHTML += '</tr>';
      });

      document.getElementById("tableBody").innerHTML = bodyHTML || `<tr><td colspan="3" class="text-center py-4" style="color:#9aa5b5;">내역이 없습니다.</td></tr>`;
    }

    function filterCategory(category) {
      currentCategoryFilter = category;
      const buttons = document.querySelectorAll('#subFilterTabs .filter-btn');
      buttons.forEach(btn => {
        if (btn.innerText === category) btn.classList.add('active');
        else btn.classList.remove('active');
      });
      renderTable();
    }

    function sortData() { renderTable(); }
  </script>
</body>
</html>
